apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: <api-gateway-image>
        ports:
        - containerPort: 4004
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"

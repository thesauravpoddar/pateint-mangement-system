apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
      - name: analytics-service
        image: <analytics-service-image>
        ports:
        - containerPort: 4002
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
      - name: patient-service
        image: <patient-service-image>
        ports:
        - containerPort: 4000
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
